# NOTE: This file uses the domain "azure.aviatrixdemo.local" which must match
# the private_dns_zone_name variable in the network layer. If you changed
# that variable, update all occurrences of the domain below.
apiVersion: v1
kind: Namespace
metadata:
  name: gatus
  labels:
    app.kubernetes.io/part-of: aks-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend
  namespace: gatus
data:
  config.yaml: |
    storage:
      type: memory
    metrics: true
    endpoints:
      # Internal Services — East-West through Aviatrix transit
      - name: "Prod Database"
        group: "Internal"
        url: "http://db.azure.aviatrixdemo.local"
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 300"
      - name: "Frontend Service"
        group: "Internal"
        url: "http://frontend.azure.aviatrixdemo.local:8080"
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 500"

      # Egress - Allowed Traffic (governed by DCF WebGroups)
      - name: "kubernetes.io"
        group: "Egress"
        url: "https://kubernetes.io"
        interval: 60s
        client:
          insecure: true
        conditions: ["[STATUS] == 200"]

      - name: "github.com/.../terraform-provider-aviatrix"
        group: "Egress"
        url: "https://github.com/AviatrixSystems/terraform-provider-aviatrix"
        interval: 60s
        client:
          insecure: true
        conditions: ["[STATUS] == 200"]

      - name: "github.com/.../avxlabs-docs"
        group: "Egress"
        url: "https://github.com/AviatrixSystems/avxlabs-docs"
        interval: 60s
        client:
          insecure: true
        conditions: ["[STATUS] == 200"]

      - name: "registry.npmjs.org"
        group: "Egress"
        url: "https://registry.npmjs.org"
        interval: 60s
        client:
          insecure: true
        conditions: ["[STATUS] == 200"]

      # Threats - Should be BLOCKED by DCF (GeoBlock + ThreatIQ)
      - name: "GeoBlock - Iran"
        group: "Threats"
        url: "icmp://www.irna.ir"
        interval: 60s
        conditions: ["[CONNECTED] == true"]

      # NOTE: This IP must appear in your Aviatrix ThreatGuard feed to be blocked.
      # Verify against your current threat intelligence feed and replace if needed.
      - name: "Threat Feed - Malicious IP"
        group: "Threats"
        url: "icmp://102.130.117.167"
        interval: 60s
        conditions: ["[CONNECTED] == true"]

    ui:
      logo: "https://aviatrix.com/wp-content/uploads/2019/10/cropped-Aviatrix-Logo@2x-1-32x32.png"
      header: "Backend Cluster - ${HOSTNAME}"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: gatus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gatus
  labels:
    app: backend
    cluster: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
        cluster: backend
        # Label used by Aviatrix k8s-firewall controller for DCF SmartGroup targeting
        aviatrix.com/app: backend
    spec:
      serviceAccountName: backend
      terminationGracePeriodSeconds: 5
      containers:
        - image: twinproduction/gatus:v5.14.0
          imagePullPolicy: IfNotPresent
          name: backend
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 250m
              memory: 100M
            requests:
              cpu: 50m
              memory: 30M
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 5
          volumeMounts:
            - mountPath: /config
              name: backend-config
      volumes:
        - configMap:
            name: backend
          name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gatus
  labels:
    app: backend
    service: backend
  annotations:
    # Internal Azure Load Balancer — reachable from frontend cluster via Aviatrix transit
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    # ExternalDNS will create DNS record: backend.azure.aviatrixdemo.local
    external-dns.alpha.kubernetes.io/hostname: backend.azure.aviatrixdemo.local
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: gatus
  annotations:
    nginx.ingress.kubernetes.io/healthcheck-path: /health
    # ExternalDNS will create DNS record: backend-web.azure.aviatrixdemo.local
    external-dns.alpha.kubernetes.io/hostname: backend-web.azure.aviatrixdemo.local
    external-dns.alpha.kubernetes.io/ttl: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
