# Pattern B: Team B Egress — applied via GitOps into team-b namespace
---
kind: FirewallPolicy
apiVersion: networking.aviatrix.com/v1alpha1
metadata:
  name: team-b-egress
  namespace: team-b
spec:
  rules:
    - name: allow-cdn-egress
      logging: true
      selector:
        matchLabels:
          app: frontend
      action: permit
      protocol: tcp
      port: 443
      destinationSmartGroups:
        - uuid: "def000ad-0000-0000-0000-000000000001"
      webGroups:
        - name: cdn-domains
    - name: allow-analytics
      logging: true
      selector:
        matchLabels:
          app: analytics
      action: permit
      protocol: tcp
      port: 443
      destinationSmartGroups:
        - uuid: "def000ad-0000-0000-0000-000000000001"
      webGroups:
        - name: analytics-domains
  webGroups:
    - name: cdn-domains
      domains:
        - "cdn.cloudflare.com"
        - "*.cloudfront.net"
        - "*.akamaized.net"
    - name: analytics-domains
      domains:
        - "api.segment.io"
        - "api.mixpanel.com"
