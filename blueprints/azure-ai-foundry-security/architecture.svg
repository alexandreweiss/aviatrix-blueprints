<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 710" width="1000" height="710">
<defs>
  <style>
    text { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
    .vnet       { fill: #EBF5FB; stroke: #0078D4; stroke-width: 2.5; }
    .subnet     { fill: #FAFCFF; stroke: #2E86C1; stroke-width: 1.5; stroke-dasharray: 6 3; }
    .gw         { fill: #DDEEFF; stroke: #1A73E8; stroke-width: 1.5; }
    .dcf        { fill: #FFFBE6; stroke: #F9A825; stroke-width: 1.5; }
    .r-deny     { fill: #FFEBEE; stroke: #EF9A9A; stroke-width: 1; }
    .r-permit   { fill: #E8F5E9; stroke: #81C784; stroke-width: 1; }
    .r-tls      { fill: #E3F2FD; stroke: #64B5F6; stroke-width: 1; }
    .aca        { fill: #EDE7F6; stroke: #7E57C2; stroke-width: 1.5; }
    .pe-box     { fill: #E8F5E9; stroke: #4CAF50; stroke-width: 1.5; }
    .pe-item    { fill: #FFFFFF; stroke: #C8E6C9; stroke-width: 1; }
    .ext-ok     { fill: #E3F2FD; stroke: #1565C0; stroke-width: 2; }
    .ext-no     { fill: #FFEBEE; stroke: #C62828; stroke-width: 2; }
    .legend     { fill: #FAFAFA; stroke: #BDBDBD; stroke-width: 1; }
  </style>
  <marker id="ah"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#37474F"/></marker>
  <marker id="ah-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#2E7D32"/></marker>
  <marker id="ah-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#B71C1C"/></marker>
  <marker id="ah-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#6A1B9A"/></marker>
</defs>

<!-- ── Titles ─────────────────────────────────────────────────────────────── -->
<text x="360" y="24" font-size="15" font-weight="bold" fill="#212121" text-anchor="middle">Azure AI Foundry — Network Security Blueprint</text>
<text x="360" y="40" font-size="10" fill="#757575" text-anchor="middle">Aviatrix DCF · Zero Trust Egress · Private Endpoints</text>

<!-- ── Azure VNet ──────────────────────────────────────────────────────────── -->
<rect x="20" y="50" width="700" height="580" rx="10" class="vnet"/>
<text x="38" y="72" font-size="13" font-weight="bold" fill="#0078D4">Azure VNet   10.11.0.0/23</text>

<!-- ── snet-avx-spoke-gw ─────────────────────────────────────────────────── -->
<rect x="40" y="82" width="280" height="533" rx="6" class="subnet"/>
<text x="52" y="100" font-size="10" font-weight="bold" fill="#2E86C1">snet-avx-spoke-gw  /28</text>

<!-- Aviatrix Spoke GW box -->
<rect x="55" y="107" width="250" height="68" rx="5" class="gw"/>
<text x="70" y="126" font-size="12" font-weight="bold" fill="#0D47A1">Aviatrix Spoke GW</text>
<text x="70" y="142" font-size="9.5" fill="#424242">SNAT enabled  ·  Cloud Type: Azure (8)</text>
<text x="70" y="157" font-size="9.5" fill="#424242">Processes all egress from agent subnet</text>

<!-- DCF Ruleset box -->
<rect x="55" y="185" width="250" height="415" rx="5" class="dcf"/>
<text x="70" y="204" font-size="11.5" font-weight="bold" fill="#E65100">DCF Ruleset</text>
<text x="70" y="218" font-size="8.5" fill="#795548">rs-foundry-agent-egress-XXXX</text>

<!-- Rule 1: DENY ThreatIQ -->
<rect x="64" y="224" width="232" height="48" rx="3" class="r-deny"/>
<text x="76" y="241" font-size="10" font-weight="bold" fill="#B71C1C">1  DENY — ThreatIQ</text>
<text x="76" y="255" font-size="9" fill="#616161">Known-malicious destinations</text>
<text x="76" y="267" font-size="9" fill="#616161">Protocol: ANY  ·  Logging: on</text>

<!-- Rule 2: PERMIT ACA FQDNs -->
<rect x="64" y="276" width="232" height="54" rx="3" class="r-permit"/>
<text x="76" y="293" font-size="10" font-weight="bold" fill="#1B5E20">2  PERMIT — ACA Runtime FQDNs</text>
<text x="76" y="307" font-size="9" fill="#616161">mcr.microsoft.com, packages.aks.azure.com…</text>
<text x="76" y="320" font-size="9" fill="#616161">TCP:443  ·  DECRYPT_NOT_ALLOWED</text>

<!-- Rule 3: PERMIT ACA SvcTags -->
<rect x="64" y="334" width="232" height="54" rx="3" class="r-permit"/>
<text x="76" y="351" font-size="10" font-weight="bold" fill="#1B5E20">3  PERMIT — ACA Service Tags</text>
<text x="76" y="365" font-size="9" fill="#616161">AzureActiveDirectory, ACR, FrontDoor…</text>
<text x="76" y="378" font-size="9" fill="#616161">TCP:443  ·  DECRYPT_NOT_ALLOWED</text>

<!-- Rule 4: PERMIT Tool-Call FQDNs -->
<rect x="64" y="392" width="232" height="54" rx="3" class="r-tls"/>
<text x="76" y="409" font-size="10" font-weight="bold" fill="#0D47A1">4  PERMIT — Tool-Call FQDNs</text>
<text x="76" y="423" font-size="9" fill="#616161">api.ipify.org + custom FQDNs</text>
<text x="76" y="436" font-size="9" fill="#616161">TCP:443  ·  DECRYPT_ALLOWED  ·  TLS inspect</text>

<!-- Rule 5: DENY Default Internet -->
<rect x="64" y="450" width="232" height="48" rx="3" class="r-deny"/>
<text x="76" y="467" font-size="10" font-weight="bold" fill="#B71C1C">5  DENY — Default Internet</text>
<text x="76" y="481" font-size="9" fill="#616161">Any unlisted destination  ·  ANY</text>

<!-- Rule 6: DENY East-West -->
<rect x="64" y="502" width="232" height="48" rx="3" class="r-deny"/>
<text x="76" y="519" font-size="10" font-weight="bold" fill="#B71C1C">6  DENY — East-West</text>
<text x="76" y="533" font-size="9" fill="#616161">Lateral movement to adjacent spokes  ·  ANY</text>

<!-- ── snet-foundry-agent ──────────────────────────────────────────────────── -->
<rect x="340" y="82" width="365" height="210" rx="6" class="subnet"/>
<text x="352" y="100" font-size="10" font-weight="bold" fill="#2E86C1">snet-foundry-agent  /24</text>
<text x="352" y="112" font-size="8.5" fill="#546E7A">delegated: Microsoft.App/environments</text>

<!-- ACA Environment box -->
<rect x="355" y="118" width="338" height="105" rx="5" class="aca"/>
<text x="372" y="138" font-size="12" font-weight="bold" fill="#4527A0">ACA Environment</text>
<text x="372" y="154" font-size="11" fill="#4527A0">Hosted AI Agents</text>
<text x="372" y="170" font-size="9.5" fill="#616161">Azure Container Apps</text>
<text x="372" y="185" font-size="9.5" fill="#616161">All egress → Aviatrix Spoke GW (SNAT)</text>
<text x="372" y="200" font-size="9" fill="#7E57C2">DCF enforces Zero Trust on all outbound traffic</text>

<!-- ── snet-private-endpoint ──────────────────────────────────────────────── -->
<rect x="340" y="308" width="365" height="300" rx="6" class="subnet"/>
<text x="352" y="326" font-size="10" font-weight="bold" fill="#2E86C1">snet-private-endpoint  /28</text>

<!-- Private Endpoints box -->
<rect x="355" y="333" width="338" height="260" rx="5" class="pe-box"/>
<text x="372" y="352" font-size="12" font-weight="bold" fill="#1B5E20">Private Endpoints</text>

<rect x="366" y="358" width="316" height="26" rx="3" class="pe-item"/>
<text x="380" y="375" font-size="10" fill="#1B5E20">AI Foundry Hub  (Cognitive Services)</text>

<rect x="366" y="388" width="316" height="26" rx="3" class="pe-item"/>
<text x="380" y="405" font-size="10" fill="#1B5E20">Azure OpenAI</text>

<rect x="366" y="418" width="316" height="26" rx="3" class="pe-item"/>
<text x="380" y="435" font-size="10" fill="#1B5E20">Azure Storage  (Blob)</text>

<rect x="366" y="448" width="316" height="26" rx="3" class="pe-item"/>
<text x="380" y="465" font-size="10" fill="#1B5E20">Azure CosmosDB</text>

<rect x="366" y="478" width="316" height="26" rx="3" class="pe-item"/>
<text x="380" y="495" font-size="10" fill="#1B5E20">Azure AI Search</text>

<text x="372" y="528" font-size="9" fill="#424242">Private DNS zones resolve *.privatelink.* names</text>
<text x="372" y="541" font-size="9" fill="#424242">to these IPs within the VNet only</text>
<text x="372" y="558" font-size="8.5" fill="#7B7B7B">Use terraform output hosts_file_entries for /etc/hosts</text>

<!-- ── External: Internet ─────────────────────────────────────────────────── -->
<rect x="742" y="50" width="238" height="95" rx="8" class="ext-ok"/>
<text x="758" y="74" font-size="13" font-weight="bold" fill="#0D47A1">Internet</text>
<text x="758" y="91" font-size="10" fill="#1565C0">Approved FQDNs only</text>
<text x="758" y="107" font-size="9" fill="#424242">TLS decrypted + inspected</text>
<text x="758" y="120" font-size="9" fill="#424242">by Aviatrix DCF  (rule 4)</text>

<!-- ── External: BLOCKED ──────────────────────────────────────────────────── -->
<rect x="742" y="168" width="238" height="80" rx="8" class="ext-no"/>
<text x="758" y="194" font-size="13" font-weight="bold" fill="#B71C1C">BLOCKED</text>
<text x="758" y="212" font-size="10" fill="#C62828">All other destinations</text>
<text x="758" y="228" font-size="9" fill="#616161">DCF rules 5 and 6</text>

<!-- ── Legend ─────────────────────────────────────────────────────────────── -->
<rect x="742" y="274" width="238" height="228" rx="8" class="legend"/>
<text x="758" y="295" font-size="11.5" font-weight="bold" fill="#424242">Legend</text>
<rect x="758" y="303" width="14" height="12" rx="2" class="r-deny"/>
<text x="778" y="313" font-size="9.5" fill="#424242">DENY rule</text>
<rect x="758" y="321" width="14" height="12" rx="2" class="r-permit"/>
<text x="778" y="331" font-size="9.5" fill="#424242">PERMIT (no TLS decrypt)</text>
<rect x="758" y="339" width="14" height="12" rx="2" class="r-tls"/>
<text x="778" y="349" font-size="9.5" fill="#424242">PERMIT + TLS inspect</text>
<rect x="758" y="357" width="14" height="12" rx="2" class="aca"/>
<text x="778" y="367" font-size="9.5" fill="#424242">ACA workload (AI Agents)</text>
<rect x="758" y="375" width="14" height="12" rx="2" class="pe-box"/>
<text x="778" y="385" font-size="9.5" fill="#424242">Private endpoints</text>
<rect x="758" y="393" width="14" height="12" rx="2" class="gw"/>
<text x="778" y="403" font-size="9.5" fill="#424242">Aviatrix gateway</text>
<rect x="758" y="411" width="14" height="12" rx="2" fill="#FAFCFF" stroke="#2E86C1" stroke-width="1" stroke-dasharray="4 2"/>
<text x="778" y="421" font-size="9.5" fill="#424242">Azure Subnet</text>
<rect x="758" y="429" width="14" height="12" rx="2" fill="#EBF5FB" stroke="#0078D4" stroke-width="1.5"/>
<text x="778" y="439" font-size="9.5" fill="#424242">Azure VNet</text>
<line x1="758" y1="452" x2="958" y2="452" stroke="#E0E0E0" stroke-width="1"/>
<text x="758" y="464" font-size="8.5" fill="#9E9E9E">azure-ai-foundry-security</text>
<text x="758" y="477" font-size="8.5" fill="#9E9E9E">network-infra module</text>
<text x="758" y="490" font-size="8.5" fill="#9E9E9E">Aviatrix Provider v8.2</text>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- Arrows                                                                    -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->

<!-- Agent egress → DCF  (L-shaped: left then down into DCF) -->
<path d="M 355,170 H 316 V 313 H 298" stroke="#6A1B9A" stroke-width="2" fill="none" marker-end="url(#ah-p)"/>
<text x="302" y="163" font-size="9" fill="#6A1B9A">egress</text>

<!-- Rule 4 PERMIT → Internet  (diagonal from VNet right edge to Internet box) -->
<path d="M 720,419 C 732,419 732,97 742,97" stroke="#2E7D32" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-end="url(#ah-g)"/>
<text x="723" y="414" font-size="8" fill="#2E7D32">PERMIT</text>
<text x="723" y="424" font-size="8" fill="#2E7D32">rule 4</text>

<!-- Rules 5-6 DENY → BLOCKED  (diagonal from VNet right edge to BLOCKED box) -->
<path d="M 720,476 C 732,476 732,208 742,208" stroke="#B71C1C" stroke-width="2" fill="none" stroke-dasharray="5 3" marker-end="url(#ah-r)"/>
<text x="723" y="472" font-size="8" fill="#B71C1C">DENY</text>
<text x="723" y="482" font-size="8" fill="#B71C1C">rules 5-6</text>

<!-- ── Bottom flow summary ─────────────────────────────────────────────────── -->
<text x="20" y="652" font-size="10" fill="#2E7D32" font-weight="bold">Approved FQDNs only</text>
<line x1="152" y1="648" x2="248" y2="648" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#ah-g)"/>
<text x="255" y="652" font-size="10" fill="#0D47A1" font-weight="bold">Internet</text>
<text x="320" y="652" font-size="10" fill="#9E9E9E">(TLS decrypted + inspected by DCF)</text>

<text x="20" y="672" font-size="10" fill="#B71C1C" font-weight="bold">All other destinations</text>
<line x1="152" y1="668" x2="248" y2="668" stroke="#B71C1C" stroke-width="1.5" marker-end="url(#ah-r)"/>
<text x="255" y="672" font-size="10" fill="#B71C1C" font-weight="bold">BLOCKED</text>
<text x="330" y="672" font-size="10" fill="#9E9E9E">(internet denied · east-west denied)</text>

<!-- Footer -->
<text x="500" y="696" font-size="8.5" fill="#BDBDBD" text-anchor="middle">Azure AI Foundry Security Blueprint  ·  Aviatrix DCF Zero Trust Egress  ·  network-infra/architecture.svg</text>
</svg>
